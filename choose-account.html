<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="Gmail is email that's intuitive, efficient, and useful. 15 GB of storage, less spam, and mobile access.">
    <meta name="robots" content="noindex, nofollow">
    <title>Gmail</title>
    <link rel="icon" href="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_16dp.png"
        type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="page-choose">
    <div class="outer">
        <div class="card">
            <div class="pw-header">
                <div class="g-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48"
                        aria-hidden="true">
                        <path fill="#4285F4"
                            d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z" />
                        <path fill="#34A853"
                            d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z" />
                        <path fill="#FABB05"
                            d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z" />
                        <path fill="#E94235"
                            d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z" />
                    </svg>
                </div>
                <h1 class="heading">Choose an account</h1>
                <div class="sub-heading">to continue to Gmail</div>
            </div>

            <div class="account-list" id="accountList">
                <!-- Accounts dynamically added from localStorage if any -->
            </div>

            <a href="/" class="account-row account-row-add" id="useAnother">
                <div class="account-avatar account-avatar-add">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="#5f6368" stroke-width="1.5">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-3.31 3.58-6 8-6s8 2.69 8 6" />
                    </svg>
                </div>
                <div class="account-info">
                    <div class="account-name">Use another account</div>
                </div>
            </a>
        </div>
    </div>

    <footer class="gfoot">
        <div class="gfoot-inner">
            <div class="gfoot-lang">
                <select id="lang" aria-label="Change language">
                    <option selected>English (United States)</option>
                    <option>हिन्दी</option>
                    <option>বাংলা</option>
                    <option>తెలుగు</option>
                    <option>मराठी</option>
                    <option>தமிழ்</option>
                    <option>ગુજરાતી</option>
                    <option>ಕನ್ನಡ</option>
                    <option>മലయാളം</option>
                    <option>ਪੰਜਾਬੀ</option>
                </select>
            </div>
            <div class="gfoot-links">
                <a href="https://support.google.com/accounts?hl=en&p=account_iph" target="_blank">Help</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en&privacy=true" target="_blank">Privacy</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en" target="_blank">Terms</a>
            </div>
        </div>
    </footer>

    <script>
    (function(){
        'use strict';
        // Only load accounts from localStorage (user-added), no defaults
        var accounts = [];
        try {
            var saved = localStorage.getItem('gAccounts');
            if(saved) accounts = JSON.parse(saved);
        } catch(e) {}

        var list = document.getElementById('accountList');
        if(list && accounts.length) {
            accounts.forEach(function(acc) {
                var row = document.createElement('a');
                row.href = '#';
                row.className = 'account-row';
                row.addEventListener('click', function(e) {
                    e.preventDefault();
                    sessionStorage.setItem('gEmail', acc.email);
                    window.location.href = 'password';
                });

                var avatar = document.createElement('div');
                avatar.className = 'account-avatar';
                avatar.style.backgroundColor = acc.color || '#5f6368';
                avatar.textContent = acc.name.charAt(0).toUpperCase();

                var info = document.createElement('div');
                info.className = 'account-info';
                info.innerHTML = '<div class="account-name">' + esc(acc.name) + '</div>' +
                                 '<div class="account-email">' + esc(acc.email) + '</div>';

                row.appendChild(avatar);
                row.appendChild(info);
                list.appendChild(row);
            });
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    })();
    </script>
</body>

</html>
